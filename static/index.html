<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        section {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-bottom: 16px;
            color: #34495e;
            font-size: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #2980b9;
        }

        .btn-excluir {
            background-color: #e74c3c;
            padding: 6px 12px;
            font-size: 0.9rem;
        }

        .btn-excluir:hover {
            background-color: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #ecf0f1;
        }

        .mensagem {
            margin-top: 12px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }

        .mensagem.sucesso {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        .mensagem.erro {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }

        .vazio {
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Pessoas</h1>

        <section>
            <h2>Nova pessoa</h2>
            <form id="form-cadastro">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite o nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="Digite o e-mail">

                <button type="submit">Cadastrar</button>
            </form>
            <div id="mensagem" class="mensagem"></div>
        </section>

        <section>
            <h2>Pessoas cadastradas</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-pessoas">
                    <tr>
                        <td colspan="4" class="vazio">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>
        const form = document.getElementById("form-cadastro");
        const mensagem = document.getElementById("mensagem");
        const listaPessoas = document.getElementById("lista-pessoas");

        function mostrarMensagem(texto, tipo) {
            mensagem.textContent = texto;
            mensagem.className = "mensagem " + tipo;
        }

        async function carregarPessoas() {
            try {
                const resposta = await fetch("/pessoas");
                const pessoas = await resposta.json();

                if (pessoas.length === 0) {
                    listaPessoas.innerHTML =
                        '<tr><td colspan="4" class="vazio">Nenhuma pessoa cadastrada ainda.</td></tr>';
                    return;
                }

                listaPessoas.innerHTML = pessoas
                    .map(
                        (pessoa) => `
                        <tr>
                            <td>${pessoa.id}</td>
                            <td>${pessoa.nome}</td>
                            <td>${pessoa.email}</td>
                            <td>
                                <button type="button" class="btn-excluir" data-id="${pessoa.id}" data-nome="${pessoa.nome}">
                                    Excluir
                                </button>
                            </td>
                        </tr>
                    `
                    )
                    .join("");

                document.querySelectorAll(".btn-excluir").forEach((botao) => {
                    botao.addEventListener("click", () => excluirPessoa(botao.dataset.id, botao.dataset.nome));
                });
            } catch (erro) {
                listaPessoas.innerHTML =
                    '<tr><td colspan="4" class="vazio">Erro ao carregar pessoas.</td></tr>';
            }
        }

        async function excluirPessoa(id, nome) {
            const confirmar = window.confirm(`Deseja excluir o cadastro de ${nome}?`);
            if (!confirmar) return;

            try {
                const resposta = await fetch(`/pessoas/${id}`, { method: "DELETE" });

                if (!resposta.ok) {
                    const dados = await resposta.json();
                    mostrarMensagem(dados.detail || "Erro ao excluir.", "erro");
                    return;
                }

                mostrarMensagem("Pessoa excluída com sucesso!", "sucesso");
                carregarPessoas();
            } catch (erro) {
                mostrarMensagem("Não foi possível conectar à API.", "erro");
            }
        }

        form.addEventListener("submit", async (evento) => {
            evento.preventDefault();

            const nome = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();

            try {
                const resposta = await fetch("/pessoas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, email }),
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    mostrarMensagem(dados.detail || "Erro ao cadastrar.", "erro");
                    return;
                }

                mostrarMensagem("Pessoa cadastrada com sucesso!", "sucesso");
                form.reset();
                carregarPessoas();
            } catch (erro) {
                mostrarMensagem("Não foi possível conectar à API.", "erro");
            }
        });

        carregarPessoas();
    </script>
</body>
</html>
